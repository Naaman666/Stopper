name: HTML/JS CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - '.github/workflows/html-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.html'
      - '**/*.js'
      - '**/*.css'
      - '.github/workflows/html-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install linters
        run: npm install -g htmlhint eslint

      - name: 🧹 Lint HTML (htmlhint)
        run: htmlhint "**/*.html" --ignore "node_modules/**"

      - name: 🧹 Lint JavaScript (eslint)
        run: eslint "**/*.js" --ignore-pattern "node_modules/**"
